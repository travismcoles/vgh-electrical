version: '3.8'

services:
  app:
    build: .
    container_name: vch-panel-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/data/panels.db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - UPLOAD_DIR=/data/uploads
      - NODE_ENV=production
    volumes:
      - panel-data:/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/auth/providers"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  panel-data:
    driver: local
